# ============================================================
# inputs.conf — Home SIEM Lab (Splunk)
# ============================================================
# This file documents every input stanza used in the lab,
# grouped by the host it belongs on. Copy only the relevant
# section into that host's local inputs.conf — don't drop the
# whole file onto every machine.
#
# Lab topology:
#   Windows endpoint  --(UF)-->        \
#   Ubuntu endpoint   --(UF)-->  Splunk Indexer/Search Head
#   pfSense (+Suricata) --(syslog)--> /
# ============================================================


# ------------------------------------------------------------
# HOST: Windows endpoint — Splunk Universal Forwarder
# File: C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf
# ------------------------------------------------------------

[WinEventLog://Application]
disabled = 0
index = win_logs

[WinEventLog://System]
disabled = 0
index = win_logs

[WinEventLog://Security]
disabled = 0
index = win_logs

# Sysmon operational log. Required for the Atomic Red Team /
# MITRE ATT&CK detections in spl-queries.md (process creation,
# LSASS access, registry persistence, etc). Assumes Sysinternals
# Sysmon is already installed with a logging config (e.g. SwiftOnSecurity
# or Olaf Hartong's config).
[WinEventLog://Microsoft-Windows-Sysmon/Operational]
disabled = 0
index = sysmon
renderXml = 1


# ------------------------------------------------------------
# HOST: Ubuntu endpoint — Splunk Universal Forwarder
# File: /opt/splunkforwarder/etc/system/local/inputs.conf
# ------------------------------------------------------------

[monitor:///var/log/auth.log]
disabled = 0
index = linux_logs
sourcetype = linux_secure


# ------------------------------------------------------------
# HOST: Splunk Indexer / Search Head
# File: /opt/splunk/etc/system/local/inputs.conf
# ------------------------------------------------------------

# Receiving port for both Universal Forwarders (Windows + Ubuntu).
# Configured in Splunk Web under Settings > Forwarding and receiving
# > Configure receiving > New Receiving Port (9997).
[splunktcp://9997]
disabled = 0

# Receives syslog forwarded from pfSense (firewall events + Suricata
# IDS alerts). Configure on pfSense side under:
# Status > System Logs > Settings > Enable Remote Logging,
# and enable "Firewall Events" + Suricata JSON/syslog output.
[udp://514]
disabled = 0
index = pfsense
sourcetype = pfsense_syslog


# ------------------------------------------------------------
# NOTES
# ------------------------------------------------------------
# - Four dedicated indexes are used instead of "main":
#     win_logs   — Windows Application/System/Security
#     sysmon     — Sysmon Operational log
#     linux_logs — Ubuntu /var/log/auth.log
#     pfsense    — pfSense firewall + Suricata syslog
#   This makes per-source retention and access controls
#   something you can point to and explain in an interview,
#   instead of everything sitting in "main" undifferentiated.
# - IMPORTANT: create these four indexes on the indexer BEFORE
#   the forwarders start sending data, or Splunk will reject
#   the events with an HTTP 400 (unknown index). See
#   indexes.conf (same repo) for the stanzas, or create them
#   via Settings > Indexes > New Index in Splunk Web.
