# ============================================================
# indexes.conf — Home SIEM Lab (Splunk Indexer)
# File: /opt/splunk/etc/system/local/indexes.conf
# ============================================================
# Creates the four dedicated indexes referenced in inputs.conf.
# Deploy this BEFORE starting the forwarders — Splunk will
# return an HTTP 400 for any event pointed at an index that
# doesn't exist yet.
#
# homePath/coldPath/thawedPath use $SPLUNK_DB (the default data
# root, usually /opt/splunk/var/lib/splunk) — adjust only if
# your install uses a different data directory.
# ============================================================

[win_logs]
homePath   = $SPLUNK_DB/win_logs/db
coldPath   = $SPLUNK_DB/win_logs/colddb
thawedPath = $SPLUNK_DB/win_logs/thaweddb
# Home-lab sizing — trim these down further if disk is tight.
maxTotalDataSizeMB = 2048
frozenTimePeriodInSecs = 1209600   # 14 days

[sysmon]
homePath   = $SPLUNK_DB/sysmon/db
coldPath   = $SPLUNK_DB/sysmon/colddb
thawedPath = $SPLUNK_DB/sysmon/thaweddb
maxTotalDataSizeMB = 2048
frozenTimePeriodInSecs = 1209600   # 14 days

[linux_logs]
homePath   = $SPLUNK_DB/linux_logs/db
coldPath   = $SPLUNK_DB/linux_logs/colddb
thawedPath = $SPLUNK_DB/linux_logs/thaweddb
maxTotalDataSizeMB = 1024
frozenTimePeriodInSecs = 1209600   # 14 days

[pfsense]
homePath   = $SPLUNK_DB/pfsense/db
coldPath   = $SPLUNK_DB/pfsense/colddb
thawedPath = $SPLUNK_DB/pfsense/thaweddb
maxTotalDataSizeMB = 1024
frozenTimePeriodInSecs = 1209600   # 14 days

# ------------------------------------------------------------
# NOTES
# ------------------------------------------------------------
# - After adding/editing indexes.conf, restart Splunk:
#     /opt/splunk/bin/splunk restart
# - Prefer the GUI instead? Settings > Indexes > New Index,
#   and just set the Index Name (e.g. "win_logs") — Splunk
#   writes the equivalent stanza here for you. Either path
#   works; don't do both for the same index (you'll get a
#   duplicate stanza warning).
# - Verify each index exists before starting forwarders:
#     Settings > Indexes  (or)  | eventcount summarize=false index=*
# - Retention above (14 days, capped MB) is sized for a home
#   lab's disk, not a production policy — call that out if you
#   present these numbers anywhere so it doesn't read as if you
#   think 14 days is an enterprise-appropriate retention window.
